<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The House — crew schedule</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#242a27;
    --paper:#f2ece0;
    --card:#fbf7ee;
    --line:rgba(36,42,39,0.14);
    --line-hard:rgba(36,42,39,0.28);
    --muted:#6f6a5f;
    --foh:#b8763a;        /* dining room — warm brass */
    --foh-wash:rgba(184,118,58,0.12);
    --boh:#3f6b6e;        /* the line — fired teal */
    --boh-wash:rgba(63,107,110,0.12);
    --flag:#c1442e;       /* 86'd — short a station */
    --flag-wash:rgba(193,68,46,0.10);
    --ok:#4a7a52;
    --r:10px;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,"Liberation Mono",monospace;
    --disp:"Bricolage Grotesque",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    --body:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:var(--body);
    font-size:15px;
    line-height:1.45;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1180px;margin:0 auto;padding:0 20px 80px}

  /* ---- header / the pass bar ---- */
  header{
    border-bottom:2px solid var(--ink);
    background:var(--paper);
    position:sticky;top:0;z-index:20;
  }
  .bar{max-width:1180px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .brand{display:flex;align-items:baseline;gap:10px;margin-right:auto}
  .wordmark{font-family:var(--disp);font-weight:800;font-size:1.5rem;letter-spacing:-0.02em;line-height:1}
  .wordmark .sep{color:var(--foh)}
  .rest-name{font-family:var(--mono);font-size:.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;background:none;border:0;cursor:pointer;padding:2px 4px;border-radius:6px}
  .rest-name:hover{background:var(--card)}
  nav.tabs{display:flex;gap:2px;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:3px}
  nav.tabs button{
    font:inherit;font-size:.9rem;border:0;background:none;color:var(--muted);
    padding:6px 14px;border-radius:7px;cursor:pointer;font-weight:600;
  }
  nav.tabs button.on{background:var(--ink);color:var(--paper)}
  nav.tabs button .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--flag);margin-left:6px;vertical-align:middle}

  /* ---- week strip ---- */
  .weekstrip{display:flex;align-items:center;gap:14px;padding:16px 0 6px}
  .weekstrip h2{font-family:var(--disp);font-weight:700;font-size:1.15rem;margin:0}
  .weekstrip .range{font-family:var(--mono);font-size:.8rem;color:var(--muted)}
  .navbtn{font:inherit;font-family:var(--mono);border:1px solid var(--line-hard);background:var(--card);width:32px;height:32px;border-radius:8px;cursor:pointer;color:var(--ink);font-size:1rem;line-height:1}
  .navbtn:hover{border-color:var(--ink)}
  .weekstrip .wsact{margin-left:auto;display:flex;align-items:center;gap:8px}
  .weekstrip .weeklabor{margin-left:0}
  .copybtn{font:inherit;font-size:.82rem;font-weight:600;padding:7px 12px;border-radius:8px;border:1px solid var(--line-hard);background:var(--card);color:var(--ink);cursor:pointer}
  .copybtn:hover{border-color:var(--ink)}
  .copybtn:disabled{opacity:.45;cursor:default}
  .copybtn:disabled:hover{border-color:var(--line-hard)}
  .undochip{font:inherit;font-family:var(--mono);font-size:.74rem;padding:6px 10px;border-radius:20px;border:1px dashed var(--line-hard);background:var(--paper);color:var(--muted);cursor:pointer}
  .undochip:hover{border-style:solid;border-color:var(--ink);color:var(--ink)}
  /* board mode toggle */
  .modesw{display:flex;border:1px solid var(--line-hard);border-radius:8px;overflow:hidden}
  .modesw button{font:inherit;font-family:var(--mono);font-size:.74rem;padding:7px 11px;border:0;background:var(--card);color:var(--muted);cursor:pointer}
  .modesw button+button{border-left:1px solid var(--line-hard)}
  .modesw button:hover{color:var(--ink)}
  .modesw button.on{background:var(--ink);color:var(--paper)}
  /* person board */
  .pgrid{display:grid;grid-template-columns:180px repeat(7,1fr);gap:6px;align-items:stretch}
  .pgh{font-family:var(--mono);font-size:.72rem;color:var(--muted);text-align:center;padding:6px 0}
  .pgh .day{display:block;font-weight:700;color:var(--ink);font-size:.8rem}
  .pzone{grid-column:1/-1;margin-top:10px}
  .prow-name{border-top:1px solid var(--line);padding:8px 6px 8px 0;display:flex;align-items:center;gap:8px}
  .prow-name .zbar{width:3px;align-self:stretch;border-radius:2px;background:var(--line-hard)}
  .prow-name.foh .zbar{background:var(--foh)}
  .prow-name.boh .zbar{background:var(--boh)}
  .prow-name .nm{font-weight:600;font-size:.88rem;line-height:1.2}
  .prow-name .meta{font-family:var(--mono);font-size:.68rem;color:var(--muted)}
  .prow-name .hrs{margin-left:auto;font-family:var(--mono);font-size:.78rem;text-align:right}
  .prow-name .hrs b{display:block;font-size:.92rem}
  .prow-name .hrs b.ot{color:var(--flag)}
  .prow-name .hrs span{font-size:.64rem;color:var(--muted)}
  .pcell{border-top:1px solid var(--line);padding:6px 2px;display:flex;flex-direction:column;gap:3px;align-items:stretch;min-height:34px}
  .pcell .pshift{font-family:var(--mono);font-size:.68rem;padding:3px 6px;border-radius:6px;border:1px solid var(--line-hard);background:var(--paper);cursor:pointer;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pcell .pshift:hover{border-color:var(--ink)}
  .pcell .pshift.foh{background:var(--foh-wash);border-color:var(--foh)}
  .pcell .pshift.boh{background:var(--boh-wash);border-color:var(--boh)}
  .pcell .pshift.sbad{border-color:var(--flag);color:var(--flag)}
  .pcell .pshift.swarn{border-color:var(--foh);color:#8a5320}
  .pcell .poff{font-family:var(--mono);font-size:.64rem;color:var(--muted);text-align:center;opacity:.75;padding-top:4px}
  .pnone{font-family:var(--mono);font-size:.68rem;color:var(--muted);text-align:center;padding-top:8px;opacity:.6}
  /* copy-week preview */
  .cp-sum{font-family:var(--mono);font-size:.8rem;line-height:1.7;margin-bottom:14px}
  .cp-sum b{font-size:1.05rem}
  .cp-list{border-top:1px solid var(--line);margin-top:10px}
  .cp-row{display:flex;gap:10px;align-items:baseline;padding:7px 0;border-bottom:1px solid var(--line);font-size:.85rem}
  .cp-row .when{font-family:var(--mono);font-size:.72rem;color:var(--muted);min-width:74px}
  .cp-row .why{font-family:var(--mono);font-size:.72rem;color:var(--flag);margin-left:auto;text-align:right}
  .cp-none{font-family:var(--mono);font-size:.76rem;color:var(--muted);padding:10px 0}
  .weeklabor{margin-left:auto;font-family:var(--mono);font-size:.82rem;color:var(--muted);text-align:right}
  .weeklabor b{color:var(--ink);font-size:1rem}

  /* ---- schedule grid ---- */
  .grid{display:grid;grid-template-columns:64px repeat(7,1fr);gap:6px;margin-top:10px}
  .gh{font-family:var(--mono);font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;padding:6px 4px;text-align:center}
  .gh .day{display:block;color:var(--ink);font-size:.8rem;font-weight:700}
  .rowlab{font-family:var(--mono);font-size:.72rem;color:var(--muted);display:flex;flex-direction:column;justify-content:center;align-items:flex-start;padding-left:2px}
  .rowlab b{color:var(--ink);font-size:.82rem;text-transform:uppercase;letter-spacing:.04em}
  .cell{
    background:var(--card);border:1px solid var(--line);border-radius:var(--r);
    min-height:78px;padding:7px;cursor:pointer;display:flex;flex-direction:column;gap:5px;
    transition:border-color .12s,box-shadow .12s;
  }
  .cell:hover{border-color:var(--ink);box-shadow:0 1px 0 var(--line-hard)}
  .cell .cov{display:flex;align-items:center;justify-content:space-between;font-family:var(--mono);font-size:.7rem;color:var(--muted)}
  .cell .cov .short{color:var(--flag);font-weight:700}
  .cell .cov .full{color:var(--ok);font-weight:700}
  .chips{display:flex;flex-wrap:wrap;gap:3px}
  .chip{font-family:var(--mono);font-size:.66rem;font-weight:600;padding:2px 5px;border-radius:5px;white-space:nowrap;line-height:1.3}
  .chip.foh{background:var(--foh-wash);color:#8a5320}
  .chip.boh{background:var(--boh-wash);color:#2c5052}
  .chip.gap{background:var(--flag-wash);color:var(--flag);border:1px dashed var(--flag)}

  /* ---- drawer ---- */
  .scrim{position:fixed;inset:0;background:rgba(20,24,22,.4);opacity:0;pointer-events:none;transition:opacity .16s;z-index:40}
  .scrim.on{opacity:1;pointer-events:auto}
  .drawer{
    position:fixed;top:0;right:0;height:100%;width:min(440px,100%);background:var(--paper);
    border-left:2px solid var(--ink);transform:translateX(100%);transition:transform .2s;z-index:50;
    display:flex;flex-direction:column;
  }
  .drawer.on{transform:translateX(0)}
  .drawer .dh{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:10px}
  .drawer .dh h3{font-family:var(--disp);margin:0;font-size:1.2rem;font-weight:700}
  .drawer .dh .sub{font-family:var(--mono);font-size:.76rem;color:var(--muted);margin-top:2px}
  .drawer .dh .x{margin-left:auto;font:inherit;font-size:1.3rem;background:none;border:0;cursor:pointer;color:var(--muted);line-height:1}
  .drawer .db{padding:14px 20px;overflow:auto;flex:1}
  .zone-h{font-family:var(--mono);font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;margin:16px 0 8px;display:flex;align-items:center;gap:8px}
  .zone-h .tag{width:9px;height:9px;border-radius:2px}
  .zone-h.foh .tag{background:var(--foh)} .zone-h.foh{color:#8a5320}
  .zone-h.boh .tag{background:var(--boh)} .zone-h.boh{color:#2c5052}
  .slot{border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin-bottom:7px;background:var(--card)}
  .slot .slot-top{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:.78rem}
  .slot .rolecode{font-weight:700}
  .slot .need{color:var(--muted);margin-left:auto}
  .slot .need.short{color:var(--flag)}
  .assigned{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
  .pill{font-family:var(--body);font-size:.82rem;padding:3px 8px;border-radius:20px;border:1px solid var(--line-hard);background:var(--paper);cursor:pointer;display:inline-flex;align-items:center;gap:6px}
  .pill:hover{border-color:var(--flag);color:var(--flag)}
  .pill .rm{font-family:var(--mono);opacity:.5}
  .emptyslot{font-family:var(--mono);font-size:.72rem;color:var(--flag);margin-top:6px;letter-spacing:.04em}
  .addrow{margin-top:8px}
  .addrow select{font:inherit;font-size:.82rem;padding:5px 8px;border:1px solid var(--line-hard);border-radius:7px;background:var(--paper);color:var(--ink);width:100%}
  .drawer .df{padding:14px 20px;border-top:1px solid var(--line);font-family:var(--mono);font-size:.82rem;display:flex;justify-content:space-between;align-items:center}
  .drawer .df b{font-size:1.05rem}

  /* ---- coverage editor ---- */
  .covwrap{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:12px}
  .covcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px}
  .covhead{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;border-bottom:1px solid var(--line);padding-bottom:10px;margin-bottom:2px}
  .covhead h3{font-family:var(--disp);margin:0;font-size:1.15rem}
  .covtime{font-family:var(--mono);font-size:.72rem;color:var(--muted)}
  .covtot{font-family:var(--mono);font-size:.7rem;color:var(--muted);text-align:right;white-space:nowrap}
  .covtot b{font-family:var(--disp);font-size:1.1rem;color:var(--ink);display:block;line-height:1}
  .reqgrid{margin:2px 0 2px}
  .reqrow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:4px 0}
  .reqrow .rc{font-family:var(--mono);font-size:.8rem}
  .reqrow input{font:inherit;font-family:var(--mono);width:58px;padding:5px 8px;border:1px solid var(--line-hard);border-radius:7px;background:var(--paper);color:var(--ink);text-align:center}
  .reqrow input:focus-visible{outline:2px solid var(--foh);outline-offset:1px;border-color:var(--foh)}
  .hoursrow{display:flex;align-items:center;gap:8px;padding:8px 0 4px;margin-bottom:2px;border-bottom:1px dashed var(--line);font-family:var(--mono);font-size:.74rem;color:var(--muted)}
  .hoursrow label{display:inline-flex;align-items:center;gap:6px}
  .hoursrow input[type=time]{font:inherit;font-family:var(--mono);padding:4px 6px;border:1px solid var(--line-hard);border-radius:6px;background:var(--paper);color:var(--ink)}
  .hoursrow input[type=time]:focus-visible{outline:2px solid var(--boh);outline-offset:1px;border-color:var(--boh)}
  .hoursrow .thru{color:var(--line-hard)}

  /* ---- conflict + availability ---- */
  .chip.cbad{outline:1.5px solid var(--flag);color:var(--flag);background:var(--flag-wash)}
  .chip.cwarn{outline:1.5px dashed var(--foh)}
  .pill.pbad{border-color:var(--flag);color:var(--flag)}
  .pill.pwarn{border-color:var(--foh);color:#8a5320}
  .pill .pw{font-family:var(--mono);font-size:.66rem;opacity:.85}
  .scard{flex-direction:column;align-items:stretch;gap:0;padding:0;overflow:hidden}
  .scard .srow{display:flex;align-items:center;gap:10px;padding:12px 14px}
  .scard .shrs{font-family:var(--mono);font-size:.62rem;color:var(--muted);text-align:right;line-height:1.2}
  .scard .shrs b{font-family:var(--disp);font-size:1rem;color:var(--ink);display:block}
  .scard .shrs b.ot{color:var(--flag)}
  .sflag{font-family:var(--mono);font-size:.7rem;padding:5px 14px;letter-spacing:.03em}
  .sflag.bad{background:var(--flag-wash);color:var(--flag)}
  .sflag.warn{background:var(--foh-wash);color:#8a5320}
  .availbtn{font:inherit;font-family:var(--mono);font-size:.7rem;text-align:left;width:100%;background:none;border:0;border-top:1px solid var(--line);padding:7px 14px;color:var(--muted);cursor:pointer;letter-spacing:.04em}
  .availbtn:hover{background:var(--card);color:var(--ink)}
  .availbox{padding:4px 14px 14px;border-top:1px solid var(--line);background:var(--card)}
  .availhint{font-family:var(--mono);font-size:.64rem;color:var(--muted);padding:7px 0}
  .availgrid{display:grid;grid-template-columns:42px repeat(7,1fr);gap:3px;align-items:center}
  .availgrid .ah{font-family:var(--mono);font-size:.62rem;color:var(--muted);text-align:center}
  .availgrid .al{font-family:var(--mono);font-size:.62rem;color:var(--muted)}
  .av{height:24px;border:1px solid var(--line);border-radius:5px;background:var(--paper);cursor:pointer;font-family:var(--mono);font-size:.66rem;color:var(--flag);padding:0}
  .av:hover{border-color:var(--ink)}
  .av.off{background:var(--flag-wash);border-color:var(--flag)}
  .tobox{margin-top:10px;border-top:1px dashed var(--line);padding-top:9px}
  .tolab{font-family:var(--mono);font-size:.66rem;color:var(--muted);display:flex;align-items:center;gap:7px}
  .tolab input{font:inherit;font-family:var(--mono);padding:4px 6px;border:1px solid var(--line-hard);border-radius:6px;background:var(--paper);color:var(--ink)}
  .tochips{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px}
  .tochip{font-family:var(--mono);font-size:.66rem;background:var(--flag-wash);color:var(--flag);border:1px solid var(--flag);border-radius:20px;padding:2px 8px;cursor:pointer}
  .tochip .rm{opacity:.6}
  .tonone{font-family:var(--mono);font-size:.66rem;color:var(--muted)}

  /* ---- stations (cross-training) ---- */
  .stations{display:flex;flex-wrap:wrap;gap:4px;padding:2px 0 8px}
  .st{font-family:var(--mono);font-size:.66rem;font-weight:600;padding:4px 7px;border-radius:5px;border:1px solid var(--line);background:var(--paper);color:var(--muted);cursor:pointer}
  .st:hover{border-color:var(--ink);color:var(--ink)}
  .st.on.foh{background:var(--foh-wash);color:#8a5320;border-color:var(--foh)}
  .st.on.boh{background:var(--boh-wash);color:#2c5052;border-color:var(--boh)}
  .st.home{outline:1.5px solid var(--ink);outline-offset:1px}

  /* ---- per-day override selector ---- */
  .dayseg{display:flex;gap:3px;flex-wrap:wrap;margin:4px 0 2px}
  .dsg{font:inherit;font-family:var(--mono);font-size:.72rem;padding:5px 11px;border:1px solid var(--line);border-radius:7px;background:var(--card);color:var(--muted);cursor:pointer;position:relative}
  .dsg:hover{border-color:var(--ink);color:var(--ink)}
  .dsg.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .dsg.hasov::after{content:"";position:absolute;top:3px;right:3px;width:5px;height:5px;border-radius:50%;background:var(--foh)}
  .dsg.clr{margin-left:auto;color:var(--flag);border-color:var(--flag);background:var(--flag-wash)}

  /* ---- roster sanity ---- */
  .sanity{margin-top:16px;border-radius:var(--r);padding:12px 16px;font-family:var(--mono);font-size:.76rem}
  .sanity.ok{background:rgba(74,122,82,.10);color:var(--ok);border:1px solid rgba(74,122,82,.35)}
  .sanity.bad{background:var(--flag-wash);color:var(--flag);border:1px solid var(--flag)}
  .sanity .sline{margin-top:6px;color:var(--ink)}
  .sanity .shint{margin-top:8px;font-size:.7rem;color:var(--muted)}

  /* ---- staff tab ---- */
  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px 20px;margin-top:16px}
  .staff-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;margin-top:14px}
  .scard{border:1px solid var(--line);border-radius:9px;padding:12px 14px;background:var(--paper);display:flex;align-items:center;gap:10px}
  .scard .zbar{width:5px;align-self:stretch;border-radius:3px}
  .scard.foh .zbar{background:var(--foh)} .scard.boh .zbar{background:var(--boh)}
  .scard .who{flex:1;min-width:0}
  .scard .nm{font-weight:600}
  .scard .meta{font-family:var(--mono);font-size:.72rem;color:var(--muted)}
  .scard .del{font:inherit;background:none;border:0;color:var(--muted);cursor:pointer;font-size:1rem}
  .scard .del:hover{color:var(--flag)}
  .form-row{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;margin-top:6px}
  .field{display:flex;flex-direction:column;gap:3px}
  .field label{font-family:var(--mono);font-size:.68rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
  .field input,.field select{font:inherit;font-size:.88rem;padding:7px 9px;border:1px solid var(--line-hard);border-radius:7px;background:var(--paper);color:var(--ink)}
  .field.name input{width:170px}
  .field.rate input{width:88px}
  .btn{font:inherit;font-weight:600;font-size:.88rem;padding:8px 16px;border-radius:8px;border:1px solid var(--ink);background:var(--ink);color:var(--paper);cursor:pointer}
  .btn:hover{opacity:.9}
  .btn.ghost{background:none;color:var(--ink)}
  .btn.ghost:hover{background:var(--card);opacity:1}

  /* ---- empty state ---- */
  .empty{text-align:center;padding:56px 20px;color:var(--muted)}
  .empty h3{font-family:var(--disp);color:var(--ink);font-size:1.3rem;margin:0 0 6px}
  .empty p{max-width:420px;margin:0 auto 18px}

  /* ---- orders stub ---- */
  .stub{border:2px dashed var(--line-hard);border-radius:14px;padding:48px 24px;text-align:center;margin-top:20px;background:var(--card)}
  .stub .tkt{font-family:var(--mono);font-size:.72rem;color:var(--foh);letter-spacing:.1em;text-transform:uppercase}
  .stub h3{font-family:var(--disp);font-size:1.5rem;margin:8px 0 6px}
  .stub p{color:var(--muted);max-width:480px;margin:0 auto}

  .legend{display:flex;gap:16px;flex-wrap:wrap;font-family:var(--mono);font-size:.72rem;color:var(--muted);margin-top:12px;align-items:center}
  .legend .k{display:inline-flex;align-items:center;gap:6px}
  .legend .sw{width:11px;height:11px;border-radius:3px}
  .legend .sw.foh{background:var(--foh)} .legend .sw.boh{background:var(--boh)} .legend .sw.gap{border:1px dashed var(--flag);background:var(--flag-wash)}

  footer{max-width:1180px;margin:40px auto 0;padding:16px 20px;border-top:1px solid var(--line);font-family:var(--mono);font-size:.72rem;color:var(--muted);display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}

  @media (max-width:820px){
    .covwrap{grid-template-columns:1fr}
    .grid{grid-template-columns:1fr;gap:10px}
    .gh{display:none}
    .rowlab{display:none}
    .cell{min-height:auto}
    .daygroup{border-top:1px solid var(--line-hard);padding-top:8px}
    .daygroup .dgh{font-family:var(--mono);font-weight:700;font-size:.85rem;margin:4px 0}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<header>
  <div class="bar">
    <div class="brand">
      <span class="wordmark">The<span class="sep">·</span>House</span>
      <button class="rest-name" id="restBtn" title="Rename your spot">▮ set restaurant</button>
    </div>
    <nav class="tabs" id="tabs">
      <button data-tab="schedule" class="on">Schedule</button>
      <button data-tab="staff">Crew</button>
      <button data-tab="coverage">Coverage</button>
      <button data-tab="orders">Orders</button>
    </nav>
  </div>
</header>

<div class="wrap" id="view"></div>

<div class="scrim" id="scrim"></div>
<aside class="drawer" id="drawer" aria-hidden="true"></aside>

<footer>
  <span>The House · v0.6 — where back of house meets front of house</span>
  <span id="foot-count"></span>
</footer>

<script>
"use strict";

/* ---------- domain ---------- */
const ROLES = {
  // FOH — the dining room
  server:  {label:"Server",    code:"SRV", zone:"foh"},
  host:    {label:"Host",      code:"HST", zone:"foh"},
  busser:  {label:"Busser",    code:"BUS", zone:"foh"},
  bar:     {label:"Bartender", code:"BAR", zone:"foh"},
  expo:    {label:"Expo",      code:"EXP", zone:"foh"},
  // BOH — the line
  chef:    {label:"Chef",      code:"CHF", zone:"boh"},
  grill:   {label:"Grill",     code:"GRL", zone:"boh"},
  line:    {label:"Line cook", code:"LIN", zone:"boh"},
  prep:    {label:"Prep",      code:"PRP", zone:"boh"},
  dish:    {label:"Dish",      code:"DSH", zone:"boh"},
};
const roleOrder = Object.keys(ROLES);

const BLOCKS = {
  open:  {label:"Open",  start:"08:00", end:"14:00"},
  mid:   {label:"Mid",   start:"11:00", end:"17:00"},
  close: {label:"Close", start:"16:00", end:"00:00"},
};
const blockOrder = ["open","mid","close"];

// block times live in state.blocks (editable); BLOCKS holds labels + defaults
function defaultBlocks(){ const o={}; blockOrder.forEach(b=>o[b]={start:BLOCKS[b].start,end:BLOCKS[b].end}); return o; }
function blkStart(b){ return ((state.blocks&&state.blocks[b])||BLOCKS[b]).start; }
function blkEnd(b){ return ((state.blocks&&state.blocks[b])||BLOCKS[b]).end; }
function toMin(t){ const [h,m]=String(t).split(":").map(Number); return h*60+m; }
function blockHours(b){ let s=toMin(blkStart(b)), e=toMin(blkEnd(b)); if(e<=s) e+=1440; return Math.round((e-s)/60*4)/4; }
function fmt12(t){ let [h,m]=String(t).split(":").map(Number); const ap=(h>=12&&h<24)?"p":"a"; let hh=h%12; if(hh===0) hh=12; return hh+(m?":"+String(m).padStart(2,"0"):"")+ap; }
function blockTime(b){ return fmt12(blkStart(b))+"–"+fmt12(blkEnd(b)); }

// default coverage requirement: block -> role -> count needed
const DEFAULT_REQ = {
  open:  {host:1, server:1, prep:1, line:1},
  mid:   {host:1, server:2, busser:1, line:2, prep:1, dish:1},
  close: {host:1, server:3, busser:1, bar:1, expo:1, chef:1, grill:1, line:2, dish:1},
};

const DAYS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

/* ---------- state ---------- */
const KEY = "the-house:v1";
let state = load();

function blankState(){
  return { restaurant:"", weekStart: mondayISO(new Date()), staff:[], schedule:{}, req: clone(DEFAULT_REQ), reqDays:{}, blocks: defaultBlocks(), otHours:40, restHours:10 };
}
function load(){
  try{
    const raw = localStorage.getItem(KEY);
    if(!raw) return blankState();
    const s = JSON.parse(raw);
    if(!s.req) s.req = clone(DEFAULT_REQ);
    if(!s.reqDays) s.reqDays = {};
    if(!s.blocks) s.blocks = defaultBlocks();
    if(typeof s.otHours !== "number") s.otHours = 40;
    if(typeof s.restHours !== "number") s.restHours = 10;
    (s.staff||[]).forEach(p=>{
      if(!Array.isArray(p.off)) p.off=[];
      if(!Array.isArray(p.timeoff)) p.timeoff=[];
      if(!Array.isArray(p.roles)) p.roles = p.role? [p.role] : ["server"];   // v0.3 -> v0.4: one station becomes many
      if(!p.role) p.role = p.roles[0];
    });
    // v0.3 stored bare ids in a shift; v0.4 stores {id, role} so cross-trained crew declare their station
    Object.values(s.schedule||{}).forEach(wk=>Object.values(wk||{}).forEach(day=>Object.keys(day||{}).forEach(b=>{
      day[b] = (day[b]||[]).map(x=>{
        if(typeof x === "string"){
          const p = (s.staff||[]).find(q=>q.id===x);
          return {id:x, role: p? (p.roles?p.roles[0]:p.role) : "server"};
        }
        return x;
      }).filter(x=>x && x.id);
    })));
    if(!s.schedule) s.schedule = {};
    if(!s.staff) s.staff = [];
    if(!s.weekStart) s.weekStart = mondayISO(new Date());
    return s;
  }catch(e){ return blankState(); }
}
function save(){
  try{ localStorage.setItem(KEY, JSON.stringify(state)); }
  catch(e){ /* storage full or blocked — app still works this session */ }
}
function clone(o){ return JSON.parse(JSON.stringify(o)); }

/* ---------- dates ---------- */
function mondayISO(d){
  const x = new Date(d);
  const day = (x.getDay()+6)%7;       // Mon=0
  x.setDate(x.getDate()-day);
  x.setHours(0,0,0,0);
  return x.toISOString().slice(0,10);
}
function addDaysISO(iso, n){
  const x = new Date(iso+"T00:00:00");
  x.setDate(x.getDate()+n);
  return x.toISOString().slice(0,10);
}
function fmtShort(iso){
  const x = new Date(iso+"T00:00:00");
  return (x.getMonth()+1)+"/"+x.getDate();
}
function weekKey(){ return state.weekStart; }

/* ---------- schedule access ---------- */
function shiftCell(dayIdx, block){
  const wk = state.schedule[weekKey()] || (state.schedule[weekKey()]={});
  const d  = wk[dayIdx] || (wk[dayIdx]={});
  if(!d[block]) d[block] = [];
  return d[block];
}
function isAssigned(dayIdx, block, staffId){
  return shiftCell(dayIdx, block).some(x=>x.id===staffId);
}
function toggleAssign(dayIdx, block, staffId, role){
  const cell = shiftCell(dayIdx, block);
  const i = cell.findIndex(x=>x.id===staffId && (role==null || x.role===role));
  if(i>=0) cell.splice(i,1); else cell.push({id:staffId, role});
  save();
}
/* cross-training: a person can work any station in .roles; roles[0] is their home station */
function canWork(s, role){ return !!s && (s.roles||[s.role]).includes(role); }
function primaryRole(s){ return (s.roles && s.roles[0]) || s.role; }
function rosterFor(role){ return state.staff.filter(s=>canWork(s, role)); }
function staffById(id){ return state.staff.find(s=>s.id===id); }

/* coverage for a shift: filled per role, gaps, cost */
/* per-day overrides (#6): a Friday close is not a Tuesday open */
function reqFor(dayIdx, block){
  const ov = (state.reqDays||{})[dayIdx+":"+block];
  return ov || state.req[block] || {};
}
function hasOverride(dayIdx, block){ return !!(state.reqDays||{})[dayIdx+":"+block]; }

function coverage(dayIdx, block){
  const req = reqFor(dayIdx, block);
  const cell = shiftCell(dayIdx, block);
  const byRole = {};
  cell.forEach(e=>{
    const s = staffById(e.id); if(!s) return;
    (byRole[e.role] = byRole[e.role]||[]).push(s);
  });
  let requiredTotal=0, shortTotal=0;
  const rows = roleOrder
    .filter(r => req[r] || (byRole[r]&&byRole[r].length))
    .map(r=>{
      const need = req[r]||0;
      const have = (byRole[r]||[]).length;
      requiredTotal += need;
      const short = Math.max(0, need-have);
      shortTotal += short;
      return {role:r, need, have, short, people:byRole[r]||[]};
    });
  const cost = cell.reduce((sum,e)=>{
    const s=staffById(e.id); return sum + (s? (s.rate||0)*blockHours(block) : 0);
  },0);
  return {rows, requiredTotal, shortTotal, filled:cell.length, cost};
}
function dayCost(dayIdx){ return blockOrder.reduce((t,b)=>t+coverage(dayIdx,b).cost,0); }
function weekCost(){ let t=0; for(let d=0;d<7;d++) t+=dayCost(d); return t; }
function weekShort(){ let t=0; for(let d=0;d<7;d++) blockOrder.forEach(b=>t+=coverage(d,b).shortTotal); return t; }
function money(n){ return "$"+Math.round(n).toLocaleString(); }

/* ---------- render ---------- */
let tab = "schedule";
let expandedStaff = null;
let covDay = null;
const view = document.getElementById("view");

function render(){
  document.querySelectorAll("#tabs button").forEach(b=>b.classList.toggle("on", b.dataset.tab===tab));
  // orders dot never; schedule dot if short this week
  const schedBtn = document.querySelector('#tabs button[data-tab="schedule"]');
  schedBtn.querySelector(".dot")?.remove();
  if(state.staff.length>0 && weekShort()>0){ const d=document.createElement("span"); d.className="dot"; d.title="uncovered stations this week"; schedBtn.appendChild(d); }
  document.getElementById("restBtn").textContent = state.restaurant ? "▮ "+state.restaurant : "▮ set restaurant";
  document.getElementById("foot-count").textContent = state.staff.length + " on crew";
  if(tab==="schedule") renderSchedule();
  else if(tab==="staff") renderStaff();
  else if(tab==="coverage") renderCoverage();
  else renderOrders();
}

function renderSchedule(){
  if(state.staff.length===0){
    view.innerHTML = emptyCrew();
    return;
  }
  const ws = weekKey();
  const short = weekShort();
  let h = `
  <div class="weekstrip">
    <button class="navbtn" id="prevW" title="Previous week">‹</button>
    <button class="navbtn" id="nextW" title="Next week">›</button>
    <div>
      <h2>Week of ${fmtShort(ws)}</h2>
      <div class="range">${fmtShort(ws)} – ${fmtShort(addDaysISO(ws,6))} · Mon→Sun</div>
    </div>
    <div class="wsact">
      ${modeSwitchHTML()}
      ${copyControlsHTML()}
    </div>
    <div class="weeklabor">
      projected labor<br><b>${money(weekCost())}</b>
      ${short>0? `<br><span style="color:var(--flag)">${short} station${short>1?"s":""} short</span>` : `<br><span style="color:var(--ok)">fully covered</span>`}
      ${weekIssueCount()>0? `<br><span style="color:var(--flag)">${weekIssueCount()} crew conflict${weekIssueCount()>1?"s":""}</span>`:""}
    </div>
  </div>
  ${boardMode==="person" ? personBoardHTML(ws) : shiftBoardHTML(ws)}
  <div class="legend">
    <span class="k"><span class="sw foh"></span> Front of house</span>
    <span class="k"><span class="sw boh"></span> Back of house</span>
    ${boardMode==="person" ? `<span class="k">grey — can't work it</span>` : `<span class="k"><span class="sw gap"></span> 86'd — station unfilled</span>`}
    <span class="k" style="margin-left:auto">click any shift to assign the crew</span>
  </div>`;
  view.innerHTML = h;

  document.getElementById("prevW").onclick = ()=>{ state.weekStart = addDaysISO(ws,-7); save(); render(); };
  document.getElementById("nextW").onclick = ()=>{ state.weekStart = addDaysISO(ws, 7); save(); render(); };
  const cpBtn = document.getElementById("copyW");
  if(cpBtn && !cpBtn.disabled) cpBtn.onclick = openCopy;
  const unBtn = document.getElementById("undoW");
  if(unBtn) unBtn.onclick = undoLast;
  document.querySelectorAll("[data-mode]").forEach(b=> b.onclick = ()=>{ boardMode = b.dataset.mode; renderSchedule(); });
  document.querySelectorAll(".cell").forEach(c=>{
    c.onclick = ()=> openShift(+c.dataset.day, c.dataset.block);
  });
  document.querySelectorAll("[data-go]").forEach(c=>{
    c.onclick = ()=>{ const [d,b] = c.dataset.go.split(":"); openShift(+d, b); };
  });
}

/* the board reads two ways: shift-first (who's on tonight) and person-first
   (what's Nina's week). view-only, so it lives outside state. */
let boardMode = "shift";

function modeSwitchHTML(){
  return `<div class="modesw">
    <button data-mode="shift"  class="${boardMode==="shift"?"on":""}" title="Who's on each shift">▦ by shift</button>
    <button data-mode="person" class="${boardMode==="person"?"on":""}" title="Each person's week">☰ by person</button>
  </div>`;
}

function shiftBoardHTML(ws){
  let h = `<div class="grid" id="grid"><div></div>`;
  for(let d=0; d<7; d++){
    h += `<div class="gh"><span class="day">${DAYS[d]}</span>${fmtShort(addDaysISO(ws,d))}</div>`;
  }
  blockOrder.forEach(block=>{
    h += `<div class="rowlab"><b>${BLOCKS[block].label}</b>${blockTime(block)}</div>`;
    for(let d=0; d<7; d++) h += cellHTML(d, block);
  });
  return h + `</div>`;
}

/* what a person's day says when they're not on it: the schedule's silence
   isn't the same as "free" */
function dayOffNote(s, d){
  if((s.timeoff||[]).includes(addDaysISO(weekKey(), d))) return "time off";
  const offBlocks = blockOrder.filter(b=>(s.off||[]).includes(d+":"+b));
  if(offBlocks.length === blockOrder.length) return "unavailable";
  if(offBlocks.length) return "no "+offBlocks.map(b=>BLOCKS[b].label.toLowerCase()).join("/");
  return "";
}

function personRowHTML(s){
  const iss = personIssues(s.id);
  const fl  = personFlag(s.id);
  const pr  = primaryRole(s);
  const zone = ROLES[pr].zone;
  const sh = personShifts(s.id);
  let h = `<div class="prow-name ${zone}">
    <span class="zbar"></span>
    <div>
      <div class="nm">${s.name}</div>
      <div class="meta">${ROLES[pr].code}${(s.roles||[]).length>1?` +${s.roles.length-1}`:""}${fl?` · <span style="color:var(--flag)">⚠ ${fl.txt}</span>`:""}</div>
    </div>
    <div class="hrs"><b class="${iss.ot?"ot":""}">${iss.hours?Math.round(iss.hours*10)/10+"h":"—"}</b><span>${iss.hours?money(sh.reduce((t,x)=>t+(s.rate||0)*blockHours(x.block),0)):"not on"}</span></div>
  </div>`;
  for(let d=0; d<7; d++){
    const mine = sh.filter(x=>x.d===d);
    let inner = mine.map(x=>{
      const off  = isOff(s, d, x.block);
      const bad  = off || (fl && fl.cls==="bad");
      const warn = !bad && fl;
      const covering = x.role !== pr;
      return `<span class="pshift ${ROLES[x.role]?ROLES[x.role].zone:""}${bad?" sbad":(warn?" swarn":"")}" data-go="${d}:${x.block}" title="${off?offReason(s,d,x.block):(ROLES[x.role]?ROLES[x.role].label:x.role)+" · "+blockTime(x.block)}">${bad||warn?"⚠ ":""}${BLOCKS[x.block].label}${covering?` · ${ROLES[x.role]?ROLES[x.role].code:x.role}`:""}</span>`;
    }).join("");
    if(!mine.length){
      const note = dayOffNote(s, d);
      inner = note ? `<span class="poff">${note}</span>` : "";
    }
    h += `<div class="pcell">${inner}</div>`;
  }
  return h;
}

function personBoardHTML(ws){
  const boh = state.staff.filter(s=>ROLES[primaryRole(s)]?.zone==="boh");
  const foh = state.staff.filter(s=>ROLES[primaryRole(s)]?.zone==="foh");
  let h = `<div class="pgrid" id="pgrid"><div></div>`;
  for(let d=0; d<7; d++){
    h += `<div class="pgh"><span class="day">${DAYS[d]}</span>${fmtShort(addDaysISO(ws,d))}</div>`;
  }
  const group = (list, zone, label)=>{
    if(!list.length) return "";
    let g = `<div class="pzone"><div class="zone-h ${zone}"><span class="tag"></span>${label} · ${list.length}</div></div>`;
    list.forEach(s=> g += personRowHTML(s));
    return g;
  };
  h += group(boh, "boh", "Back of house");
  h += group(foh, "foh", "Front of house");
  return h + `</div>`;
}

function cellHTML(d, block){
  const cov = coverage(d, block);
  let chips = "";
  cov.rows.forEach(r=>{
    r.people.forEach(p=>{
      const bad = isOff(p,d,block) || (personFlag(p.id)||{}).cls==="bad";
      const warn = !bad && personFlag(p.id);
      chips += `<span class="chip ${ROLES[r.role].zone}${bad?" cbad":(warn?" cwarn":"")}" title="${bad?"conflict":(warn?personFlag(p.id).txt:p.name)}">${bad||warn?"⚠ ":""}${lastFirst(p.name)}</span>`;
    });
    for(let i=0;i<r.short;i++){
      chips += `<span class="chip gap">${ROLES[r.role].code} 86</span>`;
    }
  });
  const covLabel = cov.shortTotal>0
    ? `<span class="short">${cov.filled}/${cov.filled+cov.shortTotal} ▾</span>`
    : `<span class="full">${cov.filled} set ✓</span>`;
  return `<div class="cell" data-day="${d}" data-block="${block}">
    <div class="cov">${covLabel}<span>${cov.cost?money(cov.cost):""}</span></div>
    <div class="chips">${chips||'<span style="color:var(--muted);font-family:var(--mono);font-size:.68rem">—</span>'}</div>
  </div>`;
}
function lastFirst(name){
  const p = name.trim().split(/\s+/);
  return p.length>1 ? p[0].charAt(0)+". "+p[p.length-1] : name;
}

/* ---------- drawer: assign a shift ---------- */
const drawer = document.getElementById("drawer");
const scrim  = document.getElementById("scrim");
let openCtx = null;

function openShift(d, block){
  openCtx = {d, block};
  drawer.innerHTML = drawerHTML(d, block);
  drawer.classList.add("on"); drawer.setAttribute("aria-hidden","false");
  scrim.classList.add("on");
  wireDrawer();
}
function closeDrawer(){
  drawer.classList.remove("on"); drawer.setAttribute("aria-hidden","true");
  scrim.classList.remove("on"); openCtx=null; render();
}
scrim.onclick = closeDrawer;

function drawerHTML(d, block){
  const cov = coverage(d, block);
  const dateISO = addDaysISO(weekKey(), d);
  const zones = {foh:[], boh:[]};
  cov.rows.forEach(r=> zones[ROLES[r.role].zone].push(r));
  // also surface required roles that are entirely empty (need>0, none assigned) already included in rows
  const zoneBlock = (zoneKey, title)=>{
    const rows = zones[zoneKey];
    if(!rows.length) return "";
    let s = `<div class="zone-h ${zoneKey}"><span class="tag"></span>${title}</div>`;
    rows.forEach(r=>{
      const roster = rosterFor(r.role).filter(p=>!isAssigned(d,block,p.id))
        .sort((a,b)=> (isOff(a,d,block)?1:0) - (isOff(b,d,block)?1:0) || (primaryRole(a)===r.role?0:1) - (primaryRole(b)===r.role?0:1));
      s += `<div class="slot">
        <div class="slot-top">
          <span class="rolecode">${ROLES[r.role].code}</span> ${ROLES[r.role].label}
          <span class="need ${r.short?'short':''}">${r.have}/${r.need||r.have}${r.short?` · ${r.short} short`:''}</span>
        </div>
        <div class="assigned">
          ${r.people.map(p=>{
            const off = isOff(p,d,block);
            const fl = personFlag(p.id);
            const warn = off ? offReason(p,d,block) : (fl?fl.txt:"");
            return `<span class="pill ${off||(fl&&fl.cls==="bad")?"pbad":(fl?"pwarn":"")}" data-rm="${p.id}" title="${warn||"remove"}">${p.name}${warn?` <span class="pw">⚠ ${warn}</span>`:""} <span class="rm">✕</span></span>`;
          }).join("")}
        </div>
        ${r.short? `<div class="emptyslot">${"◻ 86'd ".repeat(r.short).trim()}</div>`:""}
        ${roster.length? `<div class="addrow"><select data-add="${r.role}">
            <option value="">+ add ${ROLES[r.role].label.toLowerCase()}…</option>
            ${roster.map(p=>`<option value="${p.id}">${isOff(p,d,block)?"⚠ ":""}${p.name}${primaryRole(p)!==r.role?` · covering (${ROLES[primaryRole(p)].code})`:''}${p.rate?` · $${p.rate}/h`:''}${isOff(p,d,block)?` · ${offReason(p,d,block)}`:''}</option>`).join("")}
          </select></div>` : (r.short?`<div class="addrow"><select disabled><option>no free ${ROLES[r.role].label.toLowerCase()} on crew</option></select></div>`:"")}
      </div>`;
    });
    return s;
  };
  return `
    <div class="dh">
      <div>
        <h3>${DAYS[d]} · ${BLOCKS[block].label}</h3>
        <div class="sub">${fmtShort(dateISO)} · ${blockTime(block)} · ${blockHours(block)}h</div>
      </div>
      <button class="x" id="dx" aria-label="Close">✕</button>
    </div>
    <div class="db">
      ${zoneBlock("boh","Back of house")}
      ${zoneBlock("foh","Front of house")}
      <div style="margin-top:18px;font-family:var(--mono);font-size:.72rem;color:var(--muted)">
        Coverage rules are the defaults for ${BLOCKS[block].label.toLowerCase()} shifts. Editable per-shift is on the roadmap.
      </div>
    </div>
    <div class="df">
      <span>${cov.shortTotal>0? `<span style="color:var(--flag)">${cov.shortTotal} short</span>`:`<span style="color:var(--ok)">fully covered</span>`} · ${cov.filled} scheduled</span>
      <span>labor <b>${money(cov.cost)}</b></span>
    </div>`;
}
function wireDrawer(){
  document.getElementById("dx").onclick = closeDrawer;
  const {d, block} = openCtx;
  drawer.querySelectorAll("[data-add]").forEach(sel=>{
    sel.onchange = ()=>{
      if(!sel.value) return;
      const p = staffById(sel.value);
      if(p && isOff(p, d, block) &&
         !confirm(`${p.name} is marked ${offReason(p,d,block)} for ${DAYS[d]} ${BLOCKS[block].label.toLowerCase()}.\n\nSchedule anyway?`)){
        sel.value=""; return;
      }

    };
  });

}

/* ---------- copy last week ---------- */
/* one snapshot of the target week, taken right before a bulk write */
let undoSnap = null;

function copyControlsHTML(){
  const prev = addDaysISO(weekKey(), -7);
  const srcCount = weekAssignCount(prev);
  const undo = (undoSnap && undoSnap.ws === weekKey())
    ? `<button class="undochip" id="undoW" title="Put this week back the way it was">↺ undo ${undoSnap.label}</button>` : "";
  return `${undo}<button class="copybtn" id="copyW" ${srcCount?"":"disabled"} title="${srcCount? "Copy the week of "+fmtShort(prev)+" onto this one" : "Nothing scheduled the week of "+fmtShort(prev)}">⧉ copy last week</button>`;
}
function weekAssignCount(wsISO){
  const wk = state.schedule[wsISO] || {};
  let n = 0;
  for(let d=0; d<7; d++) blockOrder.forEach(b=> n += (((wk[d]||{})[b])||[]).length);
  return n;
}

/* Work out what would land before anything is written. A week is not a clean
   stamp: the roster moves, stations get untrained, time off gets approved. */
function copyPlan(){
  const ws = weekKey(), prev = addDaysISO(ws,-7);
  const srcWk = state.schedule[prev] || {};
  const moves = [], skips = [];
  for(let d=0; d<7; d++){
    blockOrder.forEach(block=>{
      (((srcWk[d]||{})[block])||[]).forEach(e=>{
        const p = staffById(e.id);
        if(!p){ skips.push({name:"someone off the roster", d, block, why:"no longer on crew"}); return; }
        if(!canWork(p, e.role)){
          skips.push({name:p.name, d, block, why:"not trained on "+roleLabel(e.role)}); return;
        }
        if((p.timeoff||[]).includes(addDaysISO(ws, d))){
          skips.push({name:p.name, d, block, why:"time off "+fmtShort(addDaysISO(ws,d))}); return;
        }
        const dupe = shiftCellRO(ws, d, block).some(x=>x.id===e.id && x.role===e.role);
        moves.push({d, block, id:e.id, role:e.role, name:p.name, dupe,
                    warn: (p.off||[]).includes(d+":"+block) ? "marked unavailable" : ""});
      });
    });
  }
  return {prev, moves, skips, existing: weekAssignCount(ws)};
}
function shiftCellRO(wsISO, d, block){ return (((state.schedule[wsISO]||{})[d]||{})[block])||[]; }
function roleLabel(r){ return ROLES[r] ? ROLES[r].label.toLowerCase() : r; }

      </div>

function applyCopy(mode){
  const ws = weekKey(), plan = copyPlan();
  undoSnap = {ws, data: clone(state.schedule[ws] || {}), label:"copy"};
  if(mode === "replace") state.schedule[ws] = {};
  plan.moves.forEach(m=>{
    const cell = shiftCell(m.d, m.block);
    if(cell.some(x=>x.id===m.id && x.role===m.role)) return;   // fill mode: don't double up
    cell.push({id:m.id, role:m.role});
  });
  save();
  closeDrawer();   // closeDrawer re-renders, which draws the undo chip
}
function undoLast(){
  if(!undoSnap || undoSnap.ws !== weekKey()) return;
  state.schedule[undoSnap.ws] = undoSnap.data;
  undoSnap = null;
  save(); render();
}

/* ---------- availability & person-level checks ---------- */
// recurring unavailability is keyed "dayIdx:block"; timeoff is a list of ISO dates
function isOff(s, dayIdx, block){
  if(!s) return false;
  if((s.off||[]).includes(dayIdx+":"+block)) return true;
  return (s.timeoff||[]).includes(addDaysISO(weekKey(), dayIdx));
}
function offReason(s, dayIdx, block){
  if((s.timeoff||[]).includes(addDaysISO(weekKey(), dayIdx))) return "time off";
  if((s.off||[]).includes(dayIdx+":"+block)) return "unavailable";
  return "";
}
// absolute minutes from the start of the week — makes overlap & rest one comparison
function shiftSpan(dayIdx, block){
  const start = dayIdx*1440 + toMin(blkStart(block));
  return {start, end: start + blockHours(block)*60};
}
function personShifts(staffId){
  const out=[];
  for(let d=0; d<7; d++) blockOrder.forEach(b=>{
    const e = shiftCell(d,b).find(x=>x.id===staffId);
    if(e){ const sp=shiftSpan(d,b); out.push({d, block:b, role:e.role, ...sp}); }
  });
  return out.sort((a,b)=>a.start-b.start);
}
function personHours(staffId){
  return personShifts(staffId).reduce((t,s)=>t+(s.end-s.start)/60, 0);
}
/* one pass finds both: a negative gap is a double-book, a small positive gap is a clopening */
function personIssues(staffId){
  const sh = personShifts(staffId);
  const overlaps=[], shortRest=[];
  for(let i=1;i<sh.length;i++){
    const prev=sh[i-1], cur=sh[i];
    if(cur.start < prev.end) overlaps.push({a:prev, b:cur});
    else if((cur.start - prev.end) < state.restHours*60) shortRest.push({a:prev, b:cur, gap:(cur.start-prev.end)/60});
  }
  const scheduledOff = sh.filter(s=>isOff(staffById(staffId), s.d, s.block));
  const hours = personHours(staffId);
  return {overlaps, shortRest, scheduledOff, hours, ot: hours > state.otHours,
          count: overlaps.length + shortRest.length + scheduledOff.length + (hours>state.otHours?1:0)};
}
function personFlag(staffId){
  const i = personIssues(staffId);
  if(i.overlaps.length) return {cls:"bad", txt:"double-booked"};
  if(i.scheduledOff.length) return {cls:"bad", txt:"scheduled while off"};
  if(i.ot) return {cls:"warn", txt:Math.round(i.hours)+"h · over "+state.otHours};
  if(i.shortRest.length) return {cls:"warn", txt:"short rest"};
  return null;
}
function weekIssueCount(){ return state.staff.reduce((t,s)=>t+personIssues(s.id).count, 0); }

/* #7 — do the rules ask for more than the crew can field? */
function rosterSanity(){
  const gaps=[];
  roleOrder.forEach(r=>{
    let peak=0, where="";
    for(let d=0; d<7; d++) blockOrder.forEach(b=>{
      const n = reqFor(d,b)[r]||0;
      if(n>peak){ peak=n; where=`${DAYS[d]} ${BLOCKS[b].label.toLowerCase()}`; }
    });
    const able = rosterFor(r).length;
    if(peak>able) gaps.push({r, peak, able, where});
  });
  if(!gaps.length) return `<div class="sanity ok">✓ your crew can field every station these rules require</div>`;
  return `<div class="sanity bad">
    <b>⚠ the rules ask for crew you don't have</b>
    ${gaps.map(g=>`<div class="sline">${ROLES[g.r].label}: needs <b>${g.peak}</b> (${g.where}) · only <b>${g.able}</b> on the crew can work it${g.able===0?" — nobody":""}</div>`).join("")}
    <div class="shint">hire, cross-train someone into the station, or lower the rule</div>
  </div>`;
}

    };
  });
  view.querySelectorAll("[data-cd]").forEach(b=> b.onclick=()=>{
    covDay = b.dataset.cd==="all" ? null : parseInt(b.dataset.cd,10);
    renderCoverage();
  });
  const clr = document.getElementById("clrOv");
  if(clr) clr.onclick=()=>{
    blockOrder.forEach(b=>{ delete state.reqDays[covDay+":"+b]; });
    save(); renderCoverage();
  };
  document.getElementById("reqReset").onclick=()=>{
    if(confirm("Reset all coverage rules to the starting defaults?")){ state.req=clone(DEFAULT_REQ); save(); renderCoverage(); }
  };
}

/* ---------- orders tab (Toast layer mount point) ---------- */
function renderOrders(){
  view.innerHTML = `
    <div class="stub">
      <div class="tkt">— order up · coming soon —</div>
      <h3>The Orders layer mounts here</h3>
      <p>This is where our take on Toast bolts on: tickets, the pass, checks, and payments — all riding on the crew and shifts you build in Schedule. A check knows which server is on, the kitchen display knows who's on the line. Same data spine, new surface.</p>
    </div>`;
}

/* ---------- rename ---------- */
document.getElementById("restBtn").onclick = ()=>{
  const n = prompt("Name your restaurant", state.restaurant||"");
  if(n!==null){ state.restaurant = n.trim(); save(); render(); }
};

/* ---------- tabs ---------- */
document.getElementById("tabs").addEventListener("click", e=>{
  const b = e.target.closest("button[data-tab]"); if(!b) return;
  tab = b.dataset.tab; render();
});
document.addEventListener("keydown", e=>{ if(e.key==="Escape" && openCtx) closeDrawer(); });

function emptyCrew(){
  return `<div class="empty">
    <h3>Build your crew first</h3>
    <p>The schedule is built on people. Head to <b>Crew</b> to add your cooks and servers, then come back and the board fills in — coverage gaps and labor cost and all.</p>
    <button class="btn" onclick="document.querySelector('#tabs button[data-tab=&quot;staff&quot;]').click()">Go to Crew</button>
  </div>`;
}

render();
</script>
